kind = "web"
previewPath = "/"
title = "MSME Supply Chain Risk Predictor"
version = "1.0.0"
id = "artifacts/supply-chain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21124

[services.development]
run = "pnpm --filter @workspace/supply-chain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/supply-chain", "run", "build" ]
publicDir = "artifacts/supply-chain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21124"
BASE_PATH = "/"
